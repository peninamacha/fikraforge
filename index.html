<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FikraForge | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF5A00; /* Matched to your logo's orange */
            --text-dark: #0A0A0A;
            --bg-light: #FAFAFA;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-light);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-dark);
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .logo {
            max-width: 300px;
            height: auto;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        h1 span {
            color: var(--primary-orange);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2.5rem;
        }

        /* Subtle pulsing animation to indicate 'working on it' */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            color: var(--primary-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: var(--primary-orange);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 90, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 90, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 90, 0, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .logo { max-width: 220px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="FikraForge Logo" class="logo">
        
        <h1>Forging something <span>extraordinary.</span></h1>
        
        <p>Our website is currently under construction. We are building a powerful new platform and will be launching soon.</p>
        
        <div class="status-indicator">
            <div class="dot"></div>
            Work in Progress
        </div>
    </div>

</body>
</html>
