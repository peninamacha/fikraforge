<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FikraForge - Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #1a1a1a;
            overflow: hidden;
        }

        /* Background Animation Styles */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.8;
            animation: float 15s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(255, 87, 34, 0.4); /* FikraForge Orange */
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(255, 138, 101, 0.4); /* Lighter Orange */
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: rgba(255, 87, 34, 0.3);
            top: 30%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            margin-bottom: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }

        .logo img {
            max-height: 40px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        h1 .highlight {
            color: #ff5722; /* Orange color from the design */
        }

        p {
            font-size: 1.25rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 3.5rem;
            max-width: 600px;
        }

        .badge-container {
            display: flex;
            justify-content: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            color: #ff5722;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .dot-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            width: 24px;
            height: 24px;
        }

        .dot-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 87, 34, 0.4);
            border-radius: 50%;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .dot {
            position: relative;
            width: 10px;
            height: 10px;
            background-color: #ff5722;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite alternate;
        }

        .loading-text::after {
            content: '';
            display: inline-block;
            width: 15px;
            text-align: left;
            animation: loading-dots 1.5s infinite step-start;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.8); }
            100% { transform: scale(1.2); }
        }

        @keyframes loading-dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation Elements -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <!-- Logo section -->
        <div class="logo">
            <!-- Replace 'logo.png' with your actual logo path -->
            <img src="logo.png" alt="FikraForge Logo">
        </div>
        
        <!-- Main Heading -->
        <h1>
            Forging something<br>
            <span class="highlight">extraordinary.</span>
        </h1>
        
        <!-- Subtext -->
        <p>
            Our website is currently under construction. We are building a<br>
            powerful new platform and will be launching soon.
        </p>
        
        <!-- Work in Progress Badge -->
        <div class="badge-container">
            <div class="badge">
                <div class="dot-wrapper">
                    <div class="dot-bg"></div>
                    <div class="dot"></div>
                </div>
                <span class="loading-text">WORK IN PROGRESS</span>
            </div>
        </div>
    </div>
</body>
</html>
